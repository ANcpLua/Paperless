name: paperless
services:
  # ----------------- C# Services -----------------
  paperlessrest:
    container_name: paperless-paperlessrest
    image: paperless-paperlessrest:latest
    build:
      context: ..
      dockerfile: PaperlessREST/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8080
      PostgreSQL__ConnectionString: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      RabbitMQ__Uri: ${RABBITMQ_URI}
      Storage__Minio__AccessKey: ${MINIO_ROOT_USER}
      Storage__Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Storage__Minio__BucketName: ${MINIO_BUCKET}
      Storage__Minio__Endpoint: minio:9000
      Storage__Minio__UseSsl: false
      Elasticsearch__Uri: http://elasticsearch:9200
      Elasticsearch__IndexName: ${ELASTICSEARCH_INDEXNAME}
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    restart: unless-stopped

  paperlessservices:
    container_name: paperless-paperlessservices
    image: paperless-paperlessservices:latest
    build:
      context: ..
      dockerfile: PaperlessServices/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      RabbitMQ__Uri: ${RABBITMQ_URI}
      Storage__Minio__AccessKey: ${MINIO_ROOT_USER}
      Storage__Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Storage__Minio__BucketName: ${MINIO_BUCKET}
      Storage__Minio__Endpoint: minio:9000
      Storage__Minio__UseSsl: false
      Elasticsearch__Uri: http://elasticsearch:9200
      Elasticsearch__IndexName: ${ELASTICSEARCH_INDEXNAME}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    restart: unless-stopped

  # ----------------- Infrastructure Services -----------------
  postgres:
    container_name: paperless-postgres
    image: postgres:15.1
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    container_name: paperless-minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    container_name: paperless-rabbitmq
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    container_name: paperless-elasticsearch
    image: elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cat/health?h=status | grep -q 'green\\|yellow'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
  elasticsearch_data:
